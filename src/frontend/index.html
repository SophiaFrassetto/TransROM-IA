<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TransROM-IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid p-3">

        <div class="card mb-2 shadow-sm">
            <div class="card-body d-flex gap-2 align-items-center">
                <input type="file" id="romfile" class="form-control form-control-sm" style="max-width: 400px;">
                <button id="loadBtn" class="btn btn-primary btn-sm">Load ROM</button>
                <span id="status" class="ms-3 text-muted"></span>
            </div>
            <div class="progress rounded-0" style="height: 6px;">
                <div id="progress" class="progress-bar progress-bar-striped progress-bar-animated"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Hex Viewer</div>
            <div class="card-body p-0 hex-container">
                <table id="hex" class="table table-sm table-bordered mb-0">
                    <thead>
                        <tr>
                            <th>Offset</th>
                            <th colspan="16">Hex</th>
                            <th colspan="16">ASCII</th>
                        </tr>
                    </thead>
                    <tbody id="hexbody"></tbody>
                </table>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>

</html>
